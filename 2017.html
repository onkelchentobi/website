<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Wagner | Archiv 2017</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; }
        .bg-glow { background: radial-gradient(circle at 50% 50%, #1c1c3d 0%, #0d1117 100%); background-attachment: fixed; }
        .connector { width: 2px; height: 20px; background-color: #30363d; margin-left: 22px; }
        .sub-nav-item.active { color: #58a6ff; font-weight: bold; border-left: 2px solid #58a6ff; padding-left: 10px; margin-left: -11px; }
        
        @media (max-width: 1023px) {
            #sidebar { position: fixed; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 50; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
            #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(4px); }
            #overlay.open { display: block; }
        }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #lightbox img { max-width: 95%; max-height: 80vh; border: 1px solid #30363d; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="bg-glow flex flex-col lg:flex-row">

    <header class="lg:hidden w-full p-4 border-b border-[#30363d] bg-[#0d1117]/90 backdrop-blur-md flex justify-between items-center sticky top-0 z-30">
        <h1 class="text-white text-lg font-bold">Tobias Wagner</h1>
        <button onclick="toggleMenu()" class="p-2 text-[#8b949e] hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </header>

    <div id="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="w-72 border-r border-[#30363d] bg-[#0d1117] flex flex-col p-6 shrink-0 overflow-y-auto">
        <div class="mb-10 hidden lg:block">
            <h1 class="text-white text-xl font-bold tracking-tight">Tobias Wagner</h1>
            <p class="text-[#484f58] text-xs font-mono mt-1">main-portfolio</p>
        </div>
        <nav>
            <div class="nav-item bg-[#21262d] p-3 rounded-lg border border-[#30363d] shadow-md">
                <div class="text-sm text-white mb-3 font-medium">Fotografie</div>
                <div class="pl-4 space-y-2 border-l border-[#30363d] ml-2 text-[#8b949e]">
                    <a href="2016.html" class="sub-nav-item text-xs block hover:text-white transition-colors">Archiv 2016</a>
                    <a href="2017.html" class="sub-nav-item text-xs block active">Archiv 2017</a>
                    <a href="2018.html" class="sub-nav-item text-xs block hover:text-white transition-colors">Archiv 2018</a>
                </div>
            </div>
            <div class="connector"></div>
            <a href="index.html?page=empfehlung" class="nav-item p-4 block rounded-lg border border-[#30363d] text-sm text-[#8b949e] hover:border-[#8b949e]">Empfehlung</a>
            <div class="connector"></div>
            <a href="index.html?page=kontakt" class="nav-item p-4 block rounded-lg border border-[#30363d] text-sm text-[#8b949e] hover:border-[#8b949e]">Kontakt</a>
            <div class="connector"></div>
            <div class="nav-item bg-[#161b22]/50 p-4 rounded-lg border border-[#30363d]">
                <span class="text-[#d29922] text-sm block mb-3 font-medium">Lizenz</span>
                <div class="pl-4 space-y-2 border-l border-[#30363d] ml-2 text-[#8b949e]">
                    <a href="index.html?page=lizenz-de" class="text-xs block hover:text-white transition-colors">DE - Deutsch</a>
                    <a href="index.html?page=lizenz-en" class="text-xs block hover:text-white transition-colors">EN - English</a>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8 lg:p-12">
        <div id="lightbox" onclick="this.style.display='none'">
            <span class="absolute top-5 right-10 text-white text-4xl cursor-pointer hover:text-[#58a6ff] transition-colors">&times;</span>
            <img id="lightbox-img" src="" alt="Vollbildansicht" class="rounded-lg">
        </div>

        <div class="max-w-5xl mx-auto space-y-6 md:space-y-8">
            <div class="border border-[#30363d] rounded-xl bg-[#0d1117]/50 p-6 md:p-8 shadow-2xl backdrop-blur-sm">
                <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">Archiv 2017</h2>
                <p class="text-[#8b949e] text-sm md:text-base">Auswahl technischer Aufnahmen aus dem Jahr 2017.</p>
            </div>
            <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8"></div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        const imageData = [
            { id: '20170514-001', title: 'Gänsegeier', desc: 'Fokus-Entfernung 31,62 Meter', mm: '183mm', f: '4.0', s: '1/4000s', iso: '200' },
            { id: '20170514-005', title: 'Aufnahme 002', desc: 'Beschreibung hier einfügen.', mm: '50mm', f: '2.8', s: '1/125s', iso: '400' },
            { id: '20170514-003', title: 'Aufnahme 003', desc: 'Beschreibung hier einfügen.', mm: '200mm', f: '5.6', s: '1/800s', iso: '800' }
        ];

        document.getElementById('gallery').innerHTML = imageData.map(img => `
            <div class="border border-[#30363d] rounded-xl bg-[#161b22] overflow-hidden flex flex-col group hover:border-[#58a6ff] transition-all shadow-lg">
                <div class="cursor-pointer aspect-square bg-black overflow-hidden" onclick="openImage('2017/${img.id}.jpg')">
                    <img src="2017/${img.id}.jpg" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                </div>
                <div class="p-5 flex flex-col flex-1">
                    <h3 class="text-white font-bold mb-1">${img.title}</h3>
                    <p class="text-xs text-[#8b949e] mb-4 flex-1">${img.desc}</p>
                    <div class="grid grid-cols-2 gap-2 pt-4 border-t border-[#30363d] font-mono text-[10px]">
                        <div class="flex flex-col"><span class="text-[#484f58] font-bold uppercase tracking-wider">Brennweite</span><span>${img.mm}</span></div>
                        <div class="flex flex-col"><span class="text-[#484f58] font-bold uppercase tracking-wider">Blende</span><span>f/${img.f}</span></div>
                        <div class="flex flex-col"><span class="text-[#484f58] font-bold uppercase tracking-wider">Zeit</span><span>${img.s}</span></div>
                        <div class="flex flex-col"><span class="text-[#484f58] font-bold uppercase tracking-wider">ISO</span><span>${img.iso}</span></div>
                    </div>
                </div>
            </div>
        `).join('');

        function openImage(src) { 
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox').style.display = 'flex'; 
        }
    </script>
</body>
</html>
