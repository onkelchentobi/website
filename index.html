<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Wagner | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; }
        .bg-glow { background: radial-gradient(circle at 50% 50%, #1c1c3d 0%, #0d1117 100%); background-attachment: fixed; }
        .connector { width: 2px; height: 20px; background-color: #30363d; margin-left: 22px; }
        .nav-item.active { border-color: #58a6ff; background-color: #161b22; }
        .sub-nav-item.active { color: #58a6ff; font-weight: bold; border-left: 2px solid #58a6ff; padding-left: 10px; margin-left: -11px; }
        
        @media (max-width: 1023px) {
            #sidebar { position: fixed; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 50; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
            #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(4px); }
            #overlay.open { display: block; }
        }
        #content-area { transition: opacity 0.15s ease-in-out; }
    </style>
</head>
<body class="bg-glow flex flex-col lg:flex-row">

    <header class="lg:hidden w-full p-4 border-b border-[#30363d] bg-[#0d1117]/90 backdrop-blur-md flex justify-between items-center sticky top-0 z-30">
        <h1 class="text-white text-lg font-bold">Tobias Wagner</h1>
        <button onclick="toggleMenu()" class="p-2 text-[#8b949e]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </header>

    <div id="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="w-72 border-r border-[#30363d] bg-[#0d1117] flex flex-col p-6 shrink-0 overflow-y-auto">
        <div class="mb-10 hidden lg:block">
            <h1 class="text-white text-xl font-bold tracking-tight">Tobias Wagner</h1>
            <p class="text-[#484f58] text-xs font-mono mt-1">main-portfolio</p>
        </div>
        <nav id="sidebar-nav">
            <div class="nav-item bg-[#0d1117] p-3 rounded-lg border border-[#30363d]">
                <div class="text-sm text-white mb-3 font-medium">Fotografie</div>
                <div class="pl-4 space-y-2 border-l border-[#30363d] ml-2 text-[#8b949e]">
                    <a href="2016.html" class="text-xs block hover:text-white">Archiv 2016</a>
                    <a href="2017.html" class="text-xs block hover:text-white">Archiv 2017</a>
                    <a href="2018.html" class="text-xs block hover:text-white">Archiv 2018</a>
                </div>
            </div>
            <div class="connector"></div>
            <div onclick="showPage('empfehlung'); closeMenuIfMobile()" class="nav-item p-4 rounded-lg border border-[#30363d] cursor-pointer text-sm text-[#8b949e]" id="nav-empfehlung">Empfehlung</div>
            <div class="connector"></div>
            <div onclick="showPage('kontakt'); closeMenuIfMobile()" class="nav-item p-4 rounded-lg border border-[#30363d] cursor-pointer text-sm text-[#8b949e]" id="nav-kontakt">Kontakt</div>
            <div class="connector"></div>
            <div id="nav-lizenz-parent" class="nav-item bg-[#161b22]/50 p-4 rounded-lg border border-[#30363d]">
                <span class="text-[#d29922] text-sm block mb-3 font-medium">Lizenz</span>
                <div class="pl-4 space-y-2 border-l border-[#30363d] ml-2 text-[#8b949e]">
                    <div onclick="showPage('lizenz-de'); closeMenuIfMobile()" class="sub-nav-item text-xs cursor-pointer" id="nav-lizenz-de">DE - Deutsch</div>
                    <div onclick="showPage('lizenz-en'); closeMenuIfMobile()" class="sub-nav-item text-xs cursor-pointer" id="nav-lizenz-en">EN - English</div>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8 lg:p-12 flex justify-center">
        <div id="content-area" class="w-full max-w-5xl"></div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }
        function closeMenuIfMobile() {
            if (window.innerWidth < 1024) toggleMenu();
        }

        const pages = {
            'empfehlung': `<div class="p-8 border border-[#30363d] rounded-xl bg-[#0d1117] shadow-2xl text-center"><h2 class="text-2xl font-bold text-white mb-4">Empfehlungen</h2><p class="text-[#8b949e] italic">Inhalt folgt.</p></div>`,
            'kontakt': `
                <div class="max-w-2xl mx-auto border border-[#30363d] rounded-xl bg-[#0d1117] p-6 md:p-8 shadow-2xl">
                    <h2 class="text-2xl font-bold text-white mb-6 text-center">Kontakt</h2>
                    <div class="flex flex-col md:flex-row items-center gap-6 p-6 bg-[#161b22] border border-[#30363d] rounded-xl">
                        <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-[#58a6ff] shrink-0">
                            <img src="ich.png" alt="Tobias Wagner" class="w-full h-full object-cover">
                        </div>
                        <div class="text-center md:text-left">
                            <h3 class="text-xl font-bold text-white">Tobias Wagner</h3>
                            <p class="text-[#8b949e] text-xs">Hobbyfotograf</p>
                            <a href="mailto:postfach.tw@gmail.com" class="text-[#58a6ff] text-sm font-mono mt-2 block italic">postfach.tw@gmail.com</a>
                        </div>
                    </div>
                </div>`,
            'lizenz-de': `<div class="border border-[#30363d] rounded-xl bg-[#0d1117] p-6 md:p-8 shadow-2xl">
